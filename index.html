<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제약 공정 분석 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --main-blue: #1e3d59; --accent-orange: #ff6e40; }
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .header { background: var(--main-blue); color: white; padding: 40px 0; margin-bottom: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .card-stat { background: white; border: none; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; padding: 25px; text-align: center; }
        .card-stat:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 2px solid var(--accent-orange); }
        .stat-value { font-size: 3rem; font-weight: 800; color: var(--main-blue); margin: 10px 0; }
        .stat-label { font-size: 1.2rem; font-weight: 600; color: #666; }
        .table-section { background: white; border-radius: 20px; padding: 30px; margin-top: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: none; }
        .process-tag { background: #e9ecef; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; margin-right: 5px; }
        .loading { font-size: 1.5rem; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🚀 생산 자재 공정 통합 대시보드</h1>
    <p>실시간 구글 시트 데이터 분석 중</p>
</div>

<div class="container">
    <div id="loading-view" class="loading">데이터를 불러오는 중입니다...</div>
    
    <div class="row g-4" id="stats-view" style="display: none;">
        <div class="col-md-3">
            <div class="card-stat" onclick="showDetail('전체')">
                <div class="stat-label">📦 전체 배치</div>
                <div id="cnt-all" class="stat-value">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat" onclick="showDetail('코팅정')">
                <div class="stat-label">✨ 코팅정</div>
                <div id="cnt-coating" class="stat-value">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat" onclick="showDetail('나정')">
                <div class="stat-label">⚪ 나정</div>
                <div id="cnt-uncoated" class="stat-value">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat" onclick="showDetail('인쇄정')">
                <div class="stat-label">🖨️ 인쇄정</div>
                <div id="cnt-printing" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div id="detail-section" class="table-section">
        <h2 id="detail-title" class="mb-4" style="color: var(--main-blue);">상세 내역</h2>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>자재명</th>
                        <th>배치번호</th>
                        <th>공정 흐름</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let finalData = [];
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=240982560&single=true&output=csv";

    // 데이터 가져오기
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            if(results.data && results.data.length > 0) {
                processRawData(results.data);
            } else {
                document.getElementById('loading-view').innerText = "데이터를 찾을 수 없습니다. 구글 시트 설정을 확인하세요.";
            }
        },
        error: function(err) {
            document.getElementById('loading-view').innerText = "CSV 로드 에러: " + err;
        }
    });

    function processRawData(rows) {
        let grouped = {};
        
        rows.forEach(row => {
            // 컬럼명에서 공백 제거하고 데이터 추출
            let mName = (row['자재명'] || row[' 자재명 '] || "").trim();
            let bNo = (row['배치번호'] || row[' 배치번호 '] || "").trim();
            let pName = (row['공정명'] || row[' 공정명 '] || "").trim();

            if(!mName || !bNo) return;

            let key = mName + "|" + bNo;
            if(!grouped[key]) {
                grouped[key] = { mName, bNo, steps: [] };
            }
            grouped[key].steps.push(pName);
        });

        finalData = Object.values(grouped).map(item => {
            let pStr = item.steps.join(",");
            let type = "나정";
            if(pStr.includes("인쇄")) type = "인쇄정";
            else if(pStr.includes("코팅")) type = "코팅정";
            
            return { ...item, type };
        });

        renderDashboard();
    }

    function renderDashboard() {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('stats-view').style.display = 'flex';

        document.getElementById('cnt-all').innerText = finalData.length;
        document.getElementById('cnt-coating').innerText = finalData.filter(d => d.type === '코팅정').length;
        document.getElementById('cnt-uncoated').innerText = finalData.filter(d => d.type === '나정').length;
        document.getElementById('cnt-printing').innerText = finalData.filter(d => d.type === '인쇄정').length;
    }

    function showDetail(type) {
        const section = document.getElementById('detail-section');
        const tbody = document.getElementById('table-body');
        document.getElementById('detail-title').innerText = `📍 ${type} 상세 내역`;
        
        section.style.display = 'block';
        tbody.innerHTML = "";

        let filtered = type === '전체' ? finalData : finalData.filter(d => d.type === type);

        filtered.forEach(d => {
            let row = `<tr>
                <td class="fw-bold">${d.mName}</td>
                <td><span class="badge bg-secondary">${d.bNo}</span></td>
                <td>${d.steps.map(s => `<span class="process-tag">${s}</span>`).join(" ➔ ")}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        section.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
